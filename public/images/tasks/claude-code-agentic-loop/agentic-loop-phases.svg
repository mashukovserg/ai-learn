<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" font-family='ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace' role="img">
  <rect x="1" y="1" width="658" height="298" rx="14" fill="#0d0d0c" stroke="#302e2b"/>
  <circle cx="28" cy="28" r="6" fill="#cf6a63"/>
  <circle cx="50" cy="28" r="6" fill="#cfa14a"/>
  <circle cx="72" cy="28" r="6" fill="#4fae7a"/>
  <text x="330" y="33" text-anchor="middle" fill="#7a756c" font-size="14">claude code · agentic loop</text>
  <line x1="16" y1="52" x2="644" y2="52" stroke="#262523"/>
  <g font-size="18">
    <text x="26" y="88"><tspan fill="#4fae7a">$ </tspan><tspan fill="#d4d0c8">gather</tspan><tspan fill="#6b675f">   read files, search context</tspan></text>
    <text x="26" y="120"><tspan fill="#4fae7a">$ </tspan><tspan fill="#d4d0c8">act</tspan><tspan fill="#6b675f">      edit code, run tools</tspan></text>
    <text x="26" y="152"><tspan fill="#4fae7a">$ </tspan><tspan fill="#d4d0c8">verify</tspan><tspan fill="#6b675f">   run tests, check vs goal</tspan></text>
    <text x="26" y="184"><tspan fill="#cf6a63">   ✗ 1 failing — goal not met</tspan></text>
    <text x="26" y="222"><tspan fill="#4fae7a">↻ loop:</tspan><tspan fill="#d4d0c8"> gather → act → verify</tspan></text>
    <text x="26" y="254"><tspan fill="#6b675f"># repeat until verified or blocked</tspan></text>
  </g>
</svg>
